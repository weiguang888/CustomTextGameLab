<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心域 · 人格图谱 - 专业心理人格测试</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');

*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#05051A;
  --glass:rgba(255,255,255,0.05);
  --glass-border:rgba(255,255,255,0.1);
  --text:#ffffff;
  --muted:#94A3B8;
  --purple:#C053F5;
  --blue:#2563EB;
  --yellow:#F59E0B;
  --green:#10B981;
  --red:#EF4444;
}

body{
  font-family:"Noto Sans SC","PingFang SC",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.7;
}

.font-display{font-family:"Noto Serif SC","PingFang SC",serif}

.hero{
  position:relative;z-index:1;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  padding:2rem;
}
.hero-bg{
  position:fixed;inset:0;z-index:0;
  background:
    radial-gradient(ellipse at 20% 50%,rgba(192,83,245,0.12) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 50%,rgba(37,99,235,0.12) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 100%,rgba(192,83,245,0.06) 0%,transparent 40%);
}
.hero-content{position:relative;z-index:2;max-width:800px}
.hero-tag{
  color:var(--muted);font-size:0.85rem;letter-spacing:0.3em;
  margin-bottom:1.5rem;opacity:0;animation:fadeIn 1s ease 0.3s forwards;
}
.hero h1{
  font-size:clamp(2rem,5vw,3.5rem);font-weight:700;line-height:1.2;
  margin-bottom:1.5rem;opacity:0;animation:fadeIn 1s ease 0.6s forwards;
}
.gradient-text{
  background:linear-gradient(135deg,var(--purple),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.hero-desc{
  color:var(--muted);font-size:1rem;line-height:1.8;
  margin-bottom:2rem;opacity:0;animation:fadeIn 1s ease 0.9s forwards;
}
.hero-stats{
  display:flex;gap:2rem;justify-content:center;margin-bottom:2.5rem;
  opacity:0;animation:fadeIn 1s ease 1.2s forwards;
}
.stat{text-align:center}
.stat-num{
  font-size:2rem;font-weight:700;font-family:"Noto Serif SC",serif;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.stat-label{font-size:0.75rem;color:var(--muted);margin-top:0.25rem}
.divider{width:1px;height:40px;background:rgba(255,255,255,0.1)}

.btn{
  display:inline-block;padding:1rem 3rem;border-radius:9999px;
  font-size:1rem;font-weight:500;cursor:pointer;border:none;
  background:linear-gradient(135deg,var(--purple),var(--blue));
  color:#fff;position:relative;overflow:hidden;
  transition:all 0.3s ease;
  box-shadow:0 0 20px rgba(192,83,245,0.3),0 0 40px rgba(37,99,235,0.15);
  opacity:0;animation:fadeIn 1s ease 1.5s forwards;
}
.btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 40px rgba(192,83,245,0.5),0 0 80px rgba(37,99,235,0.3);
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--blue),var(--purple));
  opacity:0;transition:opacity 0.3s;
}
.btn:hover::before{opacity:1}
.btn span{position:relative;z-index:1}

.btn-secondary{
  padding:0.6rem 1.5rem;border-radius:9999px;font-size:0.85rem;
  cursor:pointer;border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.05);color:var(--muted);
  transition:all 0.3s;
}
.btn-secondary:hover{border-color:rgba(255,255,255,0.3);color:#fff;background:rgba(255,255,255,0.08)}

.test-page{
  position:relative;z-index:1;min-height:100vh;
  display:flex;flex-direction:column;
}
.test-header{
  padding:1.5rem 2rem;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:10;
  background:rgba(5,5,26,0.85);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.test-header-left{display:flex;align-items:center;gap:0.75rem}
.dim-indicator{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.dim-name{font-size:0.8rem;color:var(--muted)}
.progress-count{font-size:0.8rem;color:rgba(255,255,255,0.35)}
.progress-bar{
  position:absolute;bottom:0;left:0;height:2px;
  background:linear-gradient(90deg,var(--purple),var(--blue));
  transition:width 0.5s ease;
}

.test-body{
  flex:1;display:flex;align-items:center;justify-content:center;
  padding:2rem 1rem;
}

.question-card{
  width:100%;max-width:680px;
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:2rem;
  padding:2.5rem 2rem;
  animation:cardIn 0.5s ease;
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(30px)}
  to{opacity:1;transform:translateY(0)}
}
.card-out{animation:cardOut 0.35s ease forwards}
@keyframes cardOut{
  to{opacity:0;transform:translateY(-30px)}
}

.q-badge{
  display:inline-flex;align-items:center;justify-content:center;
  padding:0.35rem 1rem;border-radius:9999px;font-size:0.7rem;
  margin-bottom:1.5rem;border:1px solid;
}
.q-text{
  font-size:clamp(1.1rem,2.5vw,1.35rem);line-height:1.6;
  margin-bottom:2rem;font-weight:400;
}

.options{display:grid;grid-template-columns:repeat(5,1fr);gap:0.5rem}
.option{
  display:flex;flex-direction:column;align-items:center;gap:0.5rem;
  padding:1rem 0.5rem;border-radius:1rem;cursor:pointer;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);
  transition:all 0.25s ease;
}
.option:hover{
  transform:scale(1.05);
  background:rgba(255,255,255,0.08);
  border-color:rgba(255,255,255,0.2);
}
.option-emoji{font-size:1.75rem;transition:transform 0.25s}
.option:hover .option-emoji{transform:scale(1.2)}
.option-label{
  font-size:0.65rem;color:var(--muted);text-align:center;
  line-height:1.3;transition:color 0.25s;
}
.option:hover .option-label{color:#fff}

.result-page{position:relative;z-index:1;min-height:100vh;padding:0 0 3rem}
.result-header{text-align:center;padding:2rem 1rem}
.result-tag{color:var(--muted);font-size:0.8rem;letter-spacing:0.2em;margin-bottom:0.5rem}
.result-title{font-size:clamp(2rem,5vw,3rem);margin-bottom:0.75rem}
.result-desc{color:var(--muted);font-size:0.85rem;max-width:500px;margin:0 auto}

.radar-container{
  max-width:480px;margin:0 auto 2rem;
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:2rem;
  padding:2rem;display:flex;justify-content:center;
}
.radar-container canvas{max-width:100%;height:auto}

.scores-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:1rem;max-width:900px;margin:0 auto 2rem;padding:0 1rem;
}
.score-card{
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:1.25rem;
  padding:1.25rem;
}
.score-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem}
.score-card-dim{display:flex;align-items:center;gap:0.5rem}
.score-dot{width:10px;height:10px;border-radius:50%}
.score-name{font-size:0.85rem;color:var(--muted)}
.score-level{font-size:0.7rem;padding:0.2rem 0.6rem;border-radius:9999px}
.score-value{font-size:1.75rem;font-weight:700;font-family:"Noto Serif SC",serif;margin-bottom:0.5rem}
.score-bar{height:4px;background:rgba(255,255,255,0.05);border-radius:9999px;overflow:hidden}
.score-bar-fill{height:100%;border-radius:9999px;transition:width 1.5s ease}

.section{
  max-width:900px;margin:0 auto 1.5rem;padding:0 1rem;
}
.section-card{
  background:var(--glass);backdrop-filter:blur(24px);
  border:1px solid var(--glass-border);border-radius:1.5rem;
  padding:2rem;
}
.section-title{
  font-size:1.25rem;font-weight:700;margin-bottom:1.25rem;
  display:flex;align-items:center;gap:0.75rem;
  font-family:"Noto Serif SC",serif;
}
.section-title .icon{
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:1rem;
}

.personality-summary p{
  color:var(--muted);font-size:0.9rem;line-height:2;
  margin-bottom:1rem;
}
.personality-summary p strong{
  color:#fff;font-weight:500;
}
.trait-row{
  display:flex;flex-wrap:wrap;gap:1rem;margin-top:1.5rem;
}
.trait-tag{
  padding:0.5rem 1rem;border-radius:9999px;font-size:0.8rem;
  border:1px solid;
}

.career-section{margin-bottom:2rem}
.career-section:last-child{margin-bottom:0}
.career-section h4{
  font-size:1rem;color:#fff;margin-bottom:0.75rem;
  display:flex;align-items:center;gap:0.5rem;
  font-family:"Noto Serif SC",serif;
}
.career-section h4::before{
  content:'';width:4px;height:18px;border-radius:9999px;
  background:linear-gradient(180deg,var(--purple),var(--blue));
}
.career-section p{
  color:var(--muted);font-size:0.88rem;line-height:2.2;
  margin-bottom:0.75rem;
}
.career-section p strong{color:#e2e8f0;font-weight:500}
.career-section ul{
  list-style:none;padding:0;margin:0;
}
.career-section ul li{
  color:var(--muted);font-size:0.85rem;line-height:2.2;
  padding-left:1.25rem;position:relative;
}
.career-section ul li::before{
  content:'→';position:absolute;left:0;
  color:var(--purple);font-size:0.7rem;
}
.career-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:0.75rem;margin-top:1rem;
}
.career-item{
  padding:0.75rem 1rem;border-radius:0.75rem;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
  font-size:0.85rem;color:#e2e8f0;
}
.career-item .career-match{
  font-size:0.7rem;color:var(--muted);margin-top:0.25rem;
}

.advice-list{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:1rem;
}
.advice-item{
  padding:1.25rem;border-radius:1rem;
  background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
}
.advice-item h5{
  font-size:0.9rem;color:#fff;margin-bottom:0.5rem;
  font-family:"Noto Serif SC",serif;
}
.advice-item p{
  font-size:0.82rem;color:var(--muted);line-height:1.9;
}

.timeline{position:relative;padding-left:1.5rem}
.timeline::before{
  content:'';position:absolute;left:5px;top:0;bottom:0;
  width:2px;background:linear-gradient(180deg,var(--purple),var(--blue));
  border-radius:9999px;
}
.timeline-item{
  position:relative;margin-bottom:1.5rem;padding-left:1.25rem;
}
.timeline-item::before{
  content:'';position:absolute;left:-1.5rem;top:6px;
  width:12px;height:12px;border-radius:50%;
  background:var(--bg);border:2px solid var(--purple);
}
.timeline-item h5{
  font-size:0.9rem;color:#fff;margin-bottom:0.4rem;
  font-family:"Noto Serif SC",serif;
}
.timeline-item p{
  font-size:0.82rem;color:var(--muted);line-height:1.9;
}

.navbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 2rem;
  position:sticky;top:0;z-index:10;
  background:rgba(5,5,26,0.9);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}
.logo{display:flex;align-items:center;gap:0.5rem}
.logo-dot{width:28px;height:28px;border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--blue))}
.logo-text{font-weight:500}

.hidden{display:none !important}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.page-transition{animation:fadeIn 0.6s ease}

.footer{text-align:center;padding:2rem 1rem;color:var(--muted);font-size:0.75rem}

@media(max-width:640px){
  .options{gap:0.35rem}
  .option{padding:0.75rem 0.25rem}
  .option-emoji{font-size:1.4rem}
  .option-label{font-size:0.55rem}
  .question-card{padding:1.5rem 1rem}
  .hero-stats{gap:1rem}
  .stat-num{font-size:1.5rem}
  .divider{height:30px}
  .scores-grid{grid-template-columns:1fr}
  .advice-list{grid-template-columns:1fr}
  .career-grid{grid-template-columns:1fr}
  .section-card{padding:1.25rem}
  .navbar{padding:0.75rem 1rem}
}
</style>
</head>
<body>

<div class="hero-bg"></div>

<div id="homePage" class="hero">

    </p>
  </div>
</div><div id="testPage" class="test-page hidden">

        可使用键盘数字键 1-5 快速作答
      </p>
    </div>
  </div>
</div>

<div id="resultPage" class="result-page hidden page-transition">

    <div class="logo">
      <div class="logo-dot"></div>
      <span class="logo-text">心域</span>

  <div class="result-header">
    <p class="result-tag">你的人格画像</p>
    <h1 class="result-title font-display"><span class="gradient-text" id="profileName"></span></h1>
    <p class="result-desc">基于大五人格模型（OCEAN）的专业测评结果，揭示你独特的人格结构</p>
  </div>

  <div class="radar-container">
    <canvas id="radarCanvas" width="400" height="400"></canvas>
  </div>

  <div class="scores-grid" id="scoresGrid"></div>

  <div class="section">
    <div class="section-card">
      <h3 class="section-title">
        <span class="icon" style="background:linear-gradient(135deg,var(--purple)20%,var(--blue)20%);color:#fff">◆</span>
        人格特质总览
      </h3>
      <div class="personality-summary" id="personalitySummary"></div>
      <div class="trait-row" id="traitRow"></div>
    </div>
  </div>

  <div class="section">
    <div class="section-card" id="deepAnalysis"></div>
  </div>

  <div class="section">
    <div class="section-card" id="careerAnalysis"></div>
  </div>

  <div class="section">
    <div class="section-card" id="careerPaths"></div>
  </div>

  <div class="section">
    <div class="section-card" id="careerPlan"></div>
  </div>

  <div class="section">
    <div class="section-card" id="futureGuide"></div>
  </div>

  <div class="section">
    <div class="section-card" id="dimDetails">
      <h3 class="section-title">
        <span class="icon" style="background:rgba(255,255,255,0.08);color:#fff">◈</span>
        五维度详细解读
      </h3>
      <div id="detailsList"></div>
    </div>
  </div>

  <div class="footer">心域 · 人格图谱 — 基于大五人格模型（OCEAN）的专业测评 · 所有数据仅在本地处理</div>
</div>

};let currentIndex=0;
const answers={};

function showPage(page){
  document.getElementById('homePage').classList.add('hidden');
  document.getElementById('testPage').classList.add('hidden');
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById(page).classList.remove('hidden');
  document.getElementById(page).classList.add('page-transition');
  window.scrollTo(0,0);
}

function startTest(){
  currentIndex=0;
  Object.keys(answers).forEach(k=>delete answers[k]);
  showPage('testPage');
  renderQuestion();
}
function goHome(){showPage('homePage')}

function renderQuestion(){
  const q=questions[currentIndex];
  const card=document.getElementById('questionCard');
  card.classList.remove('card-out');
  card.style.animation='none';
  card.offsetHeight;
  card.style.animation='';

  const dimColor=dimensions.find(d=>d.key===q.dim).color;
  document.getElementById('dimIndicator').style.background=dimColor;
  document.getElementById('dimName').textContent=q.dimName+' · '+q.sub;
  document.getElementById('progressCount').textContent=(currentIndex+1)+' / '+questions.length;
  document.getElementById('progressBar').style.width=((currentIndex/questions.length)*100)+'%';

  const badge=document.getElementById('qBadge');
  badge.textContent='第 '+(currentIndex+1)+' 题';
  badge.style.color=dimColor;
  badge.style.borderColor=dimColor+'40';
  badge.style.background=dimColor+'10';

  document.getElementById('qText').textContent=q.text;

  const optsDiv=document.getElementById('options');
  optsDiv.innerHTML='';
  answerOptions.forEach(opt=>{
    const btn=document.createElement('div');
    btn.className='option';
    btn.innerHTML='<span class="option-emoji">'+opt.emoji+'</span><span class="option-label">'+opt.label+'</span>';
    btn.onclick=()=>selectAnswer(opt.value);
    optsDiv.appendChild(btn);
  });
}

document.addEventListener('keydown',e=>{
  const testPage=document.getElementById('testPage');
  if(testPage.classList.contains('hidden'))return;
  const key=parseInt(e.key);
  if(key>=1&&key<=5)selectAnswer(key);
});

function selectAnswer(value){
  const q=questions[currentIndex];
  answers[q.id]=value;
  const card=document.getElementById('questionCard');
  card.classList.add('card-out');
  setTimeout(()=>{
    if(currentIndex<questions.length-1){
      currentIndex++;
      renderQuestion();
    }else{
      showResults();
    }
  },350);
}

function calculateScores(){
  const scores={O:0,C:0,E:0,A:0,N:0};
  const counts={O:0,C:0,E:0,A:0,N:0};
  questions.forEach(q=>{
    const a=answers[q.id];
    if(a!==undefined){
      const score=q.rev?6-a:a;
      scores[q.dim]+=score;
      counts[q.dim]++;
    }
  });
  const norm={};
  for(const k in scores){
    norm[k]=counts[k]?Math.round((scores[k]/(counts[k]*5))*100):50;
  }
  return norm;
}

function getLevel(score){
  if(score>=80)return'极高';
  if(score>=65)return'较高';
  if(score>=45)return'中等';
  if(score>=30)return'较低';
  return'极低';
}

function getLevelKey(score){
  if(score>=70)return'high';
  if(score>=45)return'mid';
  return'low';
}

function drawRadar(scores){
  const canvas=document.getElementById('radarCanvas');
  const ctx=canvas.getContext('2d');
  const dpr=Math.min(window.devicePixelRatio,2);
  canvas.width=400*dpr;
  canvas.height=400*dpr;
  ctx.scale(dpr,dpr);

  const cx=200,cy=200,radius=140;
  const dimKeys=['O','C','E','A','N'];
  const dimColors={'O':'#C053F5','C':'#2563EB','E':'#F59E0B','A':'#10B981','N':'#EF4444'};

  for(let level=1;level<=4;level++){
    ctx.beginPath();
    for(let i=0;i<5;i++){
      const angle=(Math.PI*2/5)*i-Math.PI/2;
      const dist=(radius/4)*level;
      const x=cx+Math.cos(angle)*dist;
      const y=cy+Math.sin(angle)*dist;
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    }
    ctx.closePath();
    ctx.strokeStyle='rgba(255,255,255,0.06)';
    ctx.stroke();
  }

  for(let i=0;i<5;i++){
    const angle=(Math.PI*2/5)*i-Math.PI/2;
    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(cx+Math.cos(angle)*radius,cy+Math.sin(angle)*radius);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=1;
    ctx.stroke();
  }

  ctx.beginPath();
  for(let i=0;i<5;i++){
    const angle=(Math.PI*2/5)*i-Math.PI/2;
    const score=scores[dimKeys[i]]||50;
    const dist=(score/100)*radius;
    const x=cx+Math.cos(angle)*dist;
    const y=cy+Math.sin(angle)*dist;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  }
  ctx.closePath();
  ctx.fillStyle='rgba(192,83,245,0.15)';
  ctx.fill();
  ctx.strokeStyle='rgba(192,83,245,0.6)';
  ctx.lineWidth=2;
  ctx.stroke();

  for(let i=0;i<5;i++){
    const angle=(Math.PI*2/5)*i-Math.PI/2;
    const score=scores[dimKeys[i]]||50;
    const dist=(score/100)*radius;
    const x=cx+Math.cos(angle)*dist;
    const y=cy+Math.sin(angle)*dist;
    ctx.beginPath();
    ctx.arc(x,y,5,0,Math.PI*2);
    ctx.fillStyle=dimColors[dimKeys[i]];
    ctx.fill();
    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle='#fff';
    ctx.fill();

    const labelAngle=(Math.PI*2/5)*i-Math.PI/2;
    const lx=cx+Math.cos(labelAngle)*(radius+28);
    const ly=cy+Math.sin(labelAngle)*(radius+28);
    ctx.font='12px "Noto Sans SC",sans-serif';
    ctx.textAlign='center';
    ctx.textBaseline='middle';
    ctx.fillStyle='#94A3B8';
    ctx.fillText(dimensions.find(d=>d.key===dimKeys[i]).name,lx,ly);
  }
}
