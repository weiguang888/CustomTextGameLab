<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌟 聪明宝贝大脑闯关 - 儿童趣味智力开发问答</title>
<style>
:root { --card-bg: rgba(255,255,255,0.92); }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif; min-height: 100vh; background: linear-gradient(180deg, #5BB8F5 0%, #A8D8EA 30%, #C9E8C9 60%, #F4E8C1 100%); background-attachment: fixed; display: flex; justify-content: center; align-items: center; padding: 20px; overflow-x: hidden; cursor: default; }
.floating-decorations { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.cloud { position: absolute; background: white; border-radius: 50%; opacity: 0.7; animation: floatCloud linear infinite; }
.cloud::before, .cloud::after { content: ''; position: absolute; background: white; border-radius: 50%; }
.cloud-1 { width: 120px; height: 50px; top: 8%; left: 10%; animation-duration: 25s; border-radius: 25px; }
.cloud-1::before { width: 50px; height: 50px; top: -25px; left: 25px; }
.cloud-1::after { width: 65px; height: 55px; top: -20px; left: 50px; }
.cloud-2 { width: 100px; height: 40px; top: 15%; right: 15%; animation-duration: 30s; border-radius: 20px; }
.cloud-2::before { width: 40px; height: 40px; top: -20px; left: 20px; }
.cloud-2::after { width: 55px; height: 45px; top: -15px; left: 40px; }
.cloud-3 { width: 80px; height: 35px; top: 25%; left: 60%; animation-duration: 22s; border-radius: 18px; }
.cloud-3::before { width: 35px; height: 35px; top: -18px; left: 15px; }
.cloud-3::after { width: 45px; height: 38px; top: -14px; left: 32px; }
@keyframes floatCloud { 0% { transform: translateX(0); } 25% { transform: translateX(30px); } 50% { transform: translateX(10px); } 75% { transform: translateX(-20px); } 100% { transform: translateX(0); } }
.star { position: absolute; color: #FFD93D; font-size: 24px; animation: twinkle ease-in-out infinite; }
.star-1 { top: 5%; left: 30%; animation-duration: 2s; font-size: 20px; }
.star-2 { top: 12%; left: 75%; animation-duration: 2.5s; font-size: 28px; }
.star-3 { top: 8%; left: 50%; animation-duration: 3s; font-size: 18px; }
.star-4 { top: 3%; right: 20%; animation-duration: 2.2s; font-size: 22px; }
.star-5 { top: 18%; left: 45%; animation-duration: 2.8s; font-size: 16px; }
@keyframes twinkle { 0%, 100% { opacity: 0.4; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.2); } }
@keyframes rainbowBorder { 0% { border-color: #FF6B9D; } 20% { border-color: #FFD93D; } 40% { border-color: #66BB6A; } 60% { border-color: #42A5F5; } 80% { border-color: #AB47BC; } 100% { border-color: #FF6B9D; } }
.main-container { position: relative; z-index: 1; max-width: 720px; width: 100%; }
.card { background: var(--card-bg); border-radius: 30px; padding: 30px 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.1), 0 2px 10px rgba(0,0,0,0.05); border: 4px solid #FFB74D; animation: cardEntrance 0.5s ease-out; position: relative; overflow: hidden; }
.card::after { content: ''; position: absolute; top: -2px; left: -2px; right: -2px; bottom: -2px; border-radius: 32px; border: 3px solid transparent; animation: rainbowBorder 4s linear infinite; pointer-events: none; z-index: 2; }
@keyframes cardEntrance { from { opacity: 0; transform: translateY(30px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
.header { text-align: center; margin-bottom: 25px; }
.header-icon { font-size: 60px; animation: bounce 2s ease-in-out infinite; display: inline-block; }
@keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
.header h1 { font-size: 2em; background: linear-gradient(135deg, #FF6B9D, #FF8E53, #FFD93D); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin: 8px 0 4px; font-weight: 900; }
.header .subtitle { color: #888; font-size: 0.95em; }
.form-section { margin-bottom: 20px; }
.form-label { display: block; font-size: 1.05em; font-weight: 700; color: #FF6B9D; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.option-group { display: flex; flex-wrap: wrap; gap: 10px; }
.option-btn { flex: 1; min-width: 80px; padding: 12px 16px; border: 3px solid #E0E0E0; border-radius: 18px; background: white; cursor: pointer; font-size: 0.95em; font-weight: 600; color: #666; transition: all 0.25s; text-align: center; font-family: inherit; position: relative; }
.option-btn:hover { border-color: #FFB74D; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(255,183,77,0.3); }
.option-btn.selected { background: linear-gradient(135deg, #FFF3E0, #FFF8E1); border-color: #FFB74D; color: #E65100; box-shadow: 0 4px 15px rgba(255,183,77,0.4); transform: scale(1.03); }
.option-btn.selected::after { content: '✓'; position: absolute; top: 4px; right: 10px; font-size: 0.75em; color: #FF9800; }
.start-btn { display: block; width: 100%; padding: 16px; font-size: 1.2em; font-weight: 800; border: none; border-radius: 25px; background: linear-gradient(135deg, #FF6B9D, #FF8E53); color: white; cursor: pointer; transition: all 0.3s; letter-spacing: 2px; font-family: inherit; }
.start-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(255,107,157,0.4); }
.start-btn:active { transform: translateY(-1px); }
.question-counter { text-align: center; margin-bottom: 15px; }
.progress-bar { width: 100%; height: 14px; background: #F0F0F0; border-radius: 10px; overflow: hidden; margin-bottom: 5px; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #66BB6A, #AED581); border-radius: 10px; transition: width 0.4s ease; }
.progress-text { color: #999; font-size: 0.85em; font-weight: 600; }
.question-area { background: linear-gradient(135deg, #FFF8E1, #FFF3E0); border-radius: 20px; padding: 22px; margin-bottom: 20px; border: 2px dashed #FFB74D; text-align: center; }
.question-number { font-size: 0.85em; color: #FF9800; font-weight: 700; margin-bottom: 10px; }
.question-text { font-size: 1.3em; font-weight: 700; color: #4A4A4A; line-height: 1.6; }
.answers-grid { display: grid; gap: 12px; margin-bottom: 20px; }
.answer-btn { padding: 15px 20px; border: 3px solid #E0E0E0; border-radius: 18px; background: white; cursor: pointer; font-size: 1em; font-weight: 600; color: #555; transition: all 0.25s; text-align: left; font-family: inherit; display: flex; align-items: center; gap: 12px; }
.answer-btn:hover { border-color: #42A5F5; background: #F3F8FF; transform: translateX(3px); }
.answer-marker { width: 32px; height: 32px; border-radius: 50%; background: #F0F0F0; display: flex; align-items: center; justify-content: center; font-weight: 800; color: #888; flex-shrink: 0; transition: all 0.3s; }
.answer-btn:hover .answer-marker { background: #42A5F5; color: white; }
.answer-btn.correct { background: #E8F5E9; border-color: #66BB6A; animation: correctPulse 0.5s ease; }
.answer-btn.correct .answer-marker { background: #66BB6A; color: white; }
.answer-btn.wrong { background: #FFEBEE; border-color: #EF5350; animation: shake 0.5s ease; }
.answer-btn.wrong .answer-marker { background: #EF5350; color: white; }
.answer-btn.disabled { pointer-events: none; opacity: 0.85; }
@keyframes correctPulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
.feedback-banner { text-align: center; padding: 15px; border-radius: 15px; font-weight: 700; font-size: 1em; margin-bottom: 15px; animation: fadeInUp 0.3s ease; }
.feedback-banner.correct { background: #E8F5E9; color: #2E7D32; }
.feedback-banner.wrong { background: #FFF3E0; color: #E65100; }
@keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.next-btn { display: block; width: 100%; padding: 14px; font-size: 1.1em; font-weight: 700; border: none; border-radius: 20px; cursor: pointer; transition: all 0.3s; color: white; background: linear-gradient(135deg, #42A5F5, #7E57C2); font-family: inherit; }
.next-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(66,165,245,0.3); }
.results-container { text-align: center; }
.result-congrats { font-size: 2.5em; margin-bottom: 5px; animation: bounce 1.5s ease-in-out infinite; }
.result-score-circle { width: 140px; height: 140px; border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; align-items: center; justify-content: center; background: linear-gradient(135deg, #FFD93D, #FF9800); color: white; font-weight: 900; box-shadow: 0 8px 30px rgba(255,152,0,0.3); }
.result-score-number { font-size: 2.8em; line-height: 1; }
.result-score-label { font-size: 0.9em; opacity: 0.9; }
.result-message { font-size: 1.2em; color: #666; margin: 15px 0; font-weight: 600; line-height: 1.6; }
.result-stars { font-size: 2em; margin: 10px 0; }
.analysis-card { background: linear-gradient(135deg, #F3F8FF, #FFF8E1); border-radius: 20px; padding: 20px; margin: 15px 0; text-align: left; border: 2px solid #E3F2FD; }
.analysis-card h3 { color: #FF6B9D; margin-bottom: 10px; font-size: 1.1em; display: flex; align-items: center; gap: 8px; }
.analysis-card p { color: #666; line-height: 1.8; font-size: 0.95em; }
.domain-scores { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 15px 0; }
.domain-score-item { background: white; border-radius: 15px; padding: 12px; text-align: center; border: 2px solid #F0F0F0; }
.domain-score-item .domain-icon { font-size: 1.5em; margin-bottom: 4px; }
.domain-score-item .domain-name { font-weight: 700; color: #555; font-size: 0.85em; margin-bottom: 4px; }
.domain-score-bar { height: 8px; background: #F0F0F0; border-radius: 5px; overflow: hidden; margin-top: 5px; }
.domain-score-fill { height: 100%; border-radius: 5px; transition: width 1s ease; }
.fill-logic { background: linear-gradient(90deg, #FF6B9D, #FF8E53); }
.fill-memory { background: linear-gradient(90deg, #42A5F5, #7E57C2); }
.fill-language { background: linear-gradient(90deg, #66BB6A, #AED581); }
.fill-math { background: linear-gradient(90deg, #FFD93D, #FF9800); }
.fill-creativity { background: linear-gradient(90deg, #EC407A, #AB47BC); }
.fill-observe { background: linear-gradient(90deg, #26C6DA, #42A5F5); }
.restart-btn { display: block; width: 100%; padding: 15px; font-size: 1.1em; font-weight: 700; border: none; border-radius: 25px; background: linear-gradient(135deg, #66BB6A, #43A047); color: white; cursor: pointer; font-family: inherit; margin-top: 15px; transition: all 0.3s; }
.restart-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,187,106,0.3); }
.contact-footer { margin-top: 20px; padding: 12px 18px; background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,248,225,0.8)); border-radius: 15px; text-align: center; color: #888; font-size: 0.85em; line-height: 1.6; border: 1px dashed #DDD; }
.contact-footer .qq-highlight { color: #FF6B9D; font-weight: 700; font-size: 1.05em; }
.confetti-piece { position: fixed; width: 12px; height: 12px; border-radius: 3px; animation: confettiFall linear forwards; z-index: 100; pointer-events: none; }
@keyframes confettiFall { 0% { transform: translateY(-100px) rotate(0deg); opacity: 1; } 100% { transform: translateY(105vh) rotate(720deg); opacity: 0; } }
.mascot-area { text-align: center; margin: 10px 0 20px; position: relative; }
.mascot { font-size: 80px; display: inline-block; animation: mascotWave 3s ease-in-out infinite; }
@keyframes mascotWave { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-5deg); } 75% { transform: rotate(5deg); } }
.balloon { position: absolute; font-size: 35px; animation: balloonFloat ease-in-out infinite; }
.balloon-1 { left: 5%; animation-duration: 3s; }
.balloon-2 { right: 5%; animation-duration: 3.5s; }
@keyframes balloonFloat { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
.hidden { display: none !important; }
@media (max-width: 480px) { .card { padding: 20px 16px; border-radius: 22px; } .header h1 { font-size: 1.5em; } .question-text { font-size: 1.1em; } .option-group { gap: 6px; } .option-btn { padding: 10px 10px; font-size: 0.85em; min-width: 60px; } .domain-scores { grid-template-columns: 1fr 1fr; } }
</style>
</head>
<body>

<div class="floating-decorations">
  <div class="cloud cloud-1"></div><div class="cloud cloud-2"></div><div class="cloud cloud-3"></div>
  <div class="star star-1">✦</div><div class="star star-2">✦</div><div class="star star-3">✦</div><div class="star star-4">✦</div><div class="star star-5">✦</div>
</div>

<div class="main-container">
  <div class="card" id="landingPage">
    <div class="header">
      <div class="header-icon">🧠</div>
      <h1>聪明宝贝大脑闯关</h1>
      <p class="subtitle">✨ 趣味智力开发问答游戏 ✨</p>
    </div>
    <div class="mascot-area">
      <div class="balloon balloon-1">🎈</div>
      <div class="mascot">🦊</div>
      <div class="balloon balloon-2">🎈</div>
    </div>
    <div class="form-section">
      <label class="form-label">✏️ 你的昵称</label>
      <input type="text" id="nickname" placeholder="输入你的名字吧~" style="width:100%;padding:12px 16px;border:3px solid #E0E0E0;border-radius:15px;font-size:1em;font-family:inherit;outline:none;" maxlength="20" onfocus="this.style.borderColor='#FFB74D'" onblur="this.style.borderColor='#E0E0E0'">
    </div>
    <div class="form-section">
      <label class="form-label">👤 我是</label>
      <div class="option-group" id="genderGroup">
        <button class="option-btn" data-value="boy" onclick="selectOption(this, 'genderGroup')">👦 小男生</button>
        <button class="option-btn" data-value="girl" onclick="selectOption(this, 'genderGroup')">👧 小女生</button>
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">🎂 我的年龄</label>
      <div class="option-group" id="ageGroup">
        <button class="option-btn" data-value="3-5" onclick="selectOption(this, 'ageGroup')">👶 3-5岁</button>
        <button class="option-btn" data-value="6-8" onclick="selectOption(this, 'ageGroup')">🧒 6-8岁</button>
        <button class="option-btn" data-value="9-12" onclick="selectOption(this, 'ageGroup')">🧑 9-12岁</button>
      </div>
    </div>
    <div class="form-section">
      <label class="form-label">🎯 我想挑战</label>
      <div class="option-group" id="domainGroup" style="gap:8px;">
        <button class="option-btn" data-value="logic" onclick="selectOption(this, 'domainGroup')" style="min-width:65px;font-size:0.85em;">🧩 逻辑推理</button>
        <button class="option-btn" data-value="memory" onclick="selectOption(this, 'domainGroup')" style="min-width:65px;font-size:0.85em;">🧠 记忆力</button>
        <button class="option-btn" data-value="language" onclick="selectOption(this, 'domainGroup')" style="min-width:65px;font-size:0.85em;">📖 语言表达</button>
        <button class="option-btn" data-value="math" onclick="selectOption(this, 'domainGroup')" style="min-width:65px;font-size:0.85em;">🔢 数学思维</button>
        <button class="option-btn" data-value="creativity" onclick="selectOption(this, 'domainGroup')" style="min-width:65px;font-size:0.85em;">🎨 创造力</button>
        <button class="option-btn" data-value="observe" onclick="selectOption(this, 'domainGroup')" style="min-width:65px;font-size:0.85em;">🔍 观察力</button>
        <button class="option-btn" data-value="comprehensive" onclick="selectOption(this, 'domainGroup')" style="min-width:65px;font-size:0.85em;">🌟 综合挑战</button>
      </div>
    </div>
    <button class="start-btn" id="startBtn" onclick="startGame()">🚀 开始冒险！</button>
  </div>

  <div class="card hidden" id="questionPage">
    <div class="question-counter">
      <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span class="progress-text" id="progressText">第 1 / 15 题</span>
    </div>
    <div class="question-area">
      <div class="question-number" id="questionDomain"></div>
      <div class="question-text" id="questionText"></div>
    </div>
    <div class="answers-grid" id="answersGrid"></div>
    <div class="feedback-banner hidden" id="feedbackBanner"></div>
    <button class="next-btn hidden" id="nextBtn" onclick="nextQuestion()">👉 下一题</button>
  </div>

  <div class="card hidden" id="resultPage">
    <div class="results-container">
      <div class="result-congrats" id="resultEmoji">🎉</div>
      <h2 id="resultGreeting" style="color:#FF6B9D;margin-bottom:5px;">太棒了！</h2>
      <div class="result-score-circle">
        <span class="result-score-number" id="scoreNumber">0</span>
        <span class="result-score-label">分</span>
      </div>
      <div class="result-stars" id="resultStars"></div>
      <p class="result-message" id="resultMessage"></p>
      <div class="analysis-card"><h3>📋 综合评价</h3><p id="analysisText"></p></div>
      <div class="analysis-card"><h3>💡 成长建议</h3><p id="suggestionText"></p></div>
      <div class="domain-scores" id="domainScores"></div>
      <div class="contact-footer">🎮 <span style="font-weight:600;">更多测试、文游</span>加Q群：<span class="qq-highlight">1095932194</span>，低价接个人定制 🎮</div>
      <button class="restart-btn" onclick="restartGame()">🔄 再来一次！</button>
    </div>
  </div>
</div>

<script>
// ============ GAME STATE ============
const state = { nickname: '', gender: '', ageGroup: '', domain: '', questions: [], currentIndex: 0, score: 0, answered: false, domainScores: {}, correctCount: 0 };
const QUESTIONS_PER_ROUND = 15;

// Shortcut to create a question object
const Q = (q, opts, correct, tip) => ({ q, options: opts, correct, tip });

// ============ QUESTION BANK — all practical, common-sense & reasoning focused ============
const questionBank = {

  // ==================== LOGIC ====================
  logic: {
    '3-5': [
      Q('下面哪个动物有长鼻子？', ['🐘 大象', '🐶 小狗', '🐱 小猫', '🐰 小兔'], 0, '大象的鼻子最特别！认识动物特征是观察力的第一步。'),
      Q('天黑了我们该做什么？', ['起床', '睡觉', '吃饭', '去公园'], 1, '天黑了就是晚上，晚上要好好睡觉哦。'),
      Q('下雨天出门最需要带什么？', ['🌂 雨伞', '🍦 冰淇淋', '🎈 气球', '📖 书本'], 0, '根据天气选择合适的物品，这是生活小智慧。'),
      Q('下面哪个是可以吃的水果？', ['🥕 胡萝卜', '🍗 鸡腿', '🍎 苹果', '🍞 面包'], 2, '能区分水果和其他食物——你已经学会分类啦。'),
      Q('小猫、小狗和小兔子排成一排。小猫站在中间，小兔子不站在最后。谁站在最前面？', ['🐱 小猫', '🐶 小狗', '🐰 小兔子', '🤔 不知道'], 2, '你像个小侦探一样在思考！排序游戏能锻炼逻辑力。'),
      Q('下面哪个和其他三个不是同一类？', ['🍎 苹果', '🍌 香蕉', '🚗 小汽车', '🍇 葡萄'], 2, '发现不同之处，这就是"分类"的思维能力。'),
      Q('小鸟用什么飞？', ['脚', '翅膀', '尾巴', '嘴巴'], 1, '每个动物都有自己独特的本领。'),
      Q('早晨太阳从哪边升起来？', ['东边', '西边', '南边', '北边'], 0, '观察自然现象是培养思维的好方法！'),
      Q('下面哪个是在水里生活的动物？', ['🐶 小狗', '🐟 小鱼', '🐱 小猫', '🐰 兔子'], 1, '不同动物住在不同的地方，这叫"栖息地"。'),
      Q('皮球滚到了沙发下面，用什么工具最容易取出来？', ['📖 一本书', '🧹 扫帚', '🥤 水杯', '🧸 毛绒玩具'], 1, '选对工具解决问题——这是生活中的实用推理。'),
      Q('小红比小明大，比小华小。三人中谁年龄最大？', ['小红', '小明', '小华', '一样大'], 2, '比较和排序是逻辑思考的基础，你做得很棒。'),
      Q('看规律：⭐🌙⭐🌙⭐___，下一个是什么？', ['⭐', '🌙', '☀️', '🌈'], 1, '发现规律是最有趣的思维游戏！'),
      Q('哪个是交通工具？', ['🍕 披萨', '🚌 公交车', '📺 电视', '🌳 树'], 1, '把东西分门别类是重要的思维能力。'),
      Q('如果所有的狗都会汪汪叫，小白是一只狗，小白会怎样？', ['喵喵叫', '汪汪叫', '不会叫', '会飞'], 1, '从已知的事推出新结论——这就是推理。'),
      Q('一只手有几根手指？两只手呢？', ['5和10', '4和8', '5和8', '6和12'], 0, '手指是最好的数数工具。'),

// ============ FUNCTIONS ============
function selectOption(btn, groupId) {
  document.querySelectorAll('#' + groupId + ' .option-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
}

function startGame() {
  state.nickname = document.getElementById('nickname').value.trim() || '聪明宝贝';
  const genderBtn = document.querySelector('#genderGroup .selected');
  const ageBtn = document.querySelector('#ageGroup .selected');
  const domainBtn = document.querySelector('#domainGroup .selected');
  if (!ageBtn) { shakeElement(document.getElementById('ageGroup')); return; }
  if (!domainBtn) { shakeElement(document.getElementById('domainGroup')); return; }
  state.gender = genderBtn ? genderBtn.dataset.value : '';
  state.ageGroup = ageBtn.dataset.value;
  state.domain = domainBtn.dataset.value;
  buildQuestionList();
  state.currentIndex = 0; state.score = 0; state.answered = false; state.correctCount = 0; state.domainScores = {};
  document.getElementById('landingPage').classList.add('hidden');
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('questionPage').classList.remove('hidden');
  renderQuestion();
}

function buildQuestionList() {
  const domain = state.domain, age = state.ageGroup;
  if (domain === 'comprehensive') {
    let all = [];
    ['logic','memory','language','math','creativity','observe'].forEach(d => {
      if (questionBank[d] && questionBank[d][age]) {
        questionBank[d][age].forEach(q => all.push({ ...q, domain: d }));
      }
    });
    shuffleArray(all);
    state.questions = all.slice(0, QUESTIONS_PER_ROUND);
  } else {
    const pool = questionBank[domain] ? (questionBank[domain][age] || []) : [];
    const shuffled = [...pool];
    shuffleArray(shuffled);
    state.questions = shuffled.slice(0, Math.min(QUESTIONS_PER_ROUND, shuffled.length));
  }
  state.questions.forEach(q => {
    const d = q.domain || state.domain;
    if (!state.domainScores[d]) state.domainScores[d] = { correct: 0, total: 0 };
  });
}

function shuffleArray(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
}

function renderQuestion() {
  if (state.currentIndex >= state.questions.length) { showResults(); return; }
  state.answered = false;
  const q = state.questions[state.currentIndex];
  const total = state.questions.length, current = state.currentIndex + 1;
  document.getElementById('progressFill').style.width = ((state.currentIndex / total) * 100) + '%';
  document.getElementById('progressText').textContent = `第 ${current} / ${total} 题`;
  const domainLabels = { logic:'🧩 逻辑推理', memory:'🧠 记忆力', language:'📖 语言表达', math:'🔢 数学思维', creativity:'🎨 创造力', observe:'🔍 观察力' };
  document.getElementById('questionDomain').textContent = domainLabels[q.domain || state.domain] || '🌟 综合挑战';
  document.getElementById('questionText').textContent = q.q;
  const answersGrid = document.getElementById('answersGrid');
  answersGrid.innerHTML = '';
  ['A','B','C','D'].forEach((l, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="answer-marker">${l}</span><span>${q.options[i]}</span>`;
    btn.onclick = () => selectAnswer(i);
    answersGrid.appendChild(btn);
  });
  document.getElementById('feedbackBanner').classList.add('hidden');
  document.getElementById('nextBtn').classList.add('hidden');
}

function selectAnswer(index) {
  if (state.answered) return;
  state.answered = true;
  const q = state.questions[state.currentIndex];
  const correct = q.correct, isCorrect = index === correct, d = q.domain || state.domain;
  if (state.domainScores[d]) { state.domainScores[d].total++; if (isCorrect) state.domainScores[d].correct++; }
  const buttons = document.querySelectorAll('#answersGrid .answer-btn');
  buttons.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (i === correct) btn.classList.add('correct');
    else if (i === index && !isCorrect) btn.classList.add('wrong');
  });
  if (isCorrect) { state.score += 10; state.correctCount++; }
  const feedback = document.getElementById('feedbackBanner');
  feedback.classList.remove('hidden','correct','wrong');
  const good = ['太厉害了！🌟','完全正确！👏','你真是个天才！🧠','答对啦真棒！🎉','好聪明的小脑瓜！💡'];
  const gentle = ['没关系学到了新知识！🌈','差一点点下次一定行！💪','答错也是收获哦！🌱','你在进步啦！🦋','这个问题好难但你在学习！📚'];
  if (isCorrect) {
    feedback.classList.add('correct');
    feedback.innerHTML = good[Math.floor(Math.random()*5)] + '<br><small>' + (q.tip || '') + '</small>';
    createSparkles();
  } else {
    feedback.classList.add('wrong');
    feedback.innerHTML = gentle[Math.floor(Math.random()*5)] + '<br><small>' + (q.tip || '') + '</small>';
  }
  document.getElementById('nextBtn').classList.remove('hidden');
  document.getElementById('nextBtn').textContent = state.currentIndex < state.questions.length - 1 ? '👉 下一题' : '🎊 查看成绩';
}

function nextQuestion() {
  state.currentIndex++;
  state.currentIndex >= state.questions.length ? showResults() : renderQuestion();
}

function showResults() {
  document.getElementById('questionPage').classList.add('hidden');
  document.getElementById('resultPage').classList.remove('hidden');
  const total = state.questions.length, percent = Math.round((state.correctCount / total) * 100);
  document.getElementById('scoreNumber').textContent = state.score;
  let stars = percent >= 90 ? 5 : percent >= 75 ? 4 : percent >= 60 ? 3 : percent >= 40 ? 2 : 1;
  document.getElementById('resultStars').innerHTML = '⭐'.repeat(stars) + '<span style="opacity:0.3">⭐</span>'.repeat(5-stars);
  const ge = state.gender === 'girl' ? '👧' : (state.gender === 'boy' ? '👦' : '🌟');
  let emoji, greeting;
  if (percent >= 90) { emoji='🏆'; greeting=`${state.nickname}${ge}，你是超级天才宝贝！`; }
  else if (percent >= 75) { emoji='🌟'; greeting=`${state.nickname}${ge}，你的表现非常出色！`; }
  else if (percent >= 60) { emoji='💪'; greeting=`${state.nickname}${ge}，你做得很好继续加油！`; }
  else if (percent >= 40) { emoji='🌱'; greeting=`${state.nickname}${ge}，你正在快速成长中！`; }
  else { emoji='🦋'; greeting=`${state.nickname}${ge}，每一次尝试都在让大脑变强！`; }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultGreeting').textContent = greeting;

  const msgs = {
    90: `${state.nickname}小朋友，你的表现让所有人惊叹！你展示了非常棒的思维能力和知识储备。${state.gender==='girl'?'聪明的小公主':(state.gender==='boy'?'帅气的小王子':'聪明的小宝贝')}，保持这份好奇心和热情，你的未来充满无限可能！`,
    75: `${state.nickname}小朋友，你真的非常优秀！大部分题目都难不倒你。偶尔的小失误完全正常，这正是继续学习和成长的动力。`,
    60: `${state.nickname}小朋友，你做得很好！每个孩子都有自己的成长节奏，你正在以自己的方式闪闪发光。`,
    40: `${state.nickname}小朋友，今天你学到了很多新知识！答对和答错都是大脑成长的一部分。最重要的是你勇敢尝试了！`,
    0: `${state.nickname}小朋友，你今天勇敢地挑战了自己！大脑就像肌肉，每次锻炼都会变强。坚持下去，你会越来越棒的！`
  };
  let mk = percent >= 90 ? 90 : percent >= 75 ? 75 : percent >= 60 ? 60 : percent >= 40 ? 40 : 0;
  document.getElementById('resultMessage').textContent = msgs[mk];
  document.getElementById('analysisText').textContent = genAnalysis(percent);
  document.getElementById('suggestionText').textContent = genSuggestions();

  const dsDiv = document.getElementById('domainScores');
  const di = { logic:{icon:'🧩',name:'逻辑推理',fc:'fill-logic'}, memory:{icon:'🧠',name:'记忆力',fc:'fill-memory'}, language:{icon:'📖',name:'语言表达',fc:'fill-language'}, math:{icon:'🔢',name:'数学思维',fc:'fill-math'}, creativity:{icon:'🎨',name:'创造力',fc:'fill-creativity'}, observe:{icon:'🔍',name:'观察力',fc:'fill-observe'} };
  dsDiv.innerHTML = '';
  Object.keys(state.domainScores).forEach(d => {
    const ds = state.domainScores[d], pct = ds.total > 0 ? Math.round((ds.correct/ds.total)*100) : 0;
    const info = di[d] || {icon:'🌟',name:d,fc:'fill-logic'};
    dsDiv.innerHTML += `<div class="domain-score-item"><div class="domain-icon">${info.icon}</div><div class="domain-name">${info.name}</div><div style="font-weight:900;color:#FF6B9D;font-size:1.2em;">${pct}%</div><div class="domain-score-bar"><div class="domain-score-fill ${info.fc}" style="width:${pct}%"></div></div><div style="font-size:0.75em;color:#999;">${ds.correct}/${ds.total}题</div></div>`;
  });
  createConfetti();
  document.getElementById('resultPage').scrollIntoView({ behavior:'smooth' });
}

function genAnalysis(percent) {
  const n = state.nickname;
  if (percent >= 90) return `${n}小朋友在本次测试中表现非常出色！你的思维敏捷、反应迅速，在多个方面都展现了超出同龄人的水平。这说明你平时一定是个爱动脑筋、充满好奇心的孩子。每一次思考都在让你的大脑变得更强壮。`;
  if (percent >= 75) return `${n}小朋友的测试表现非常优秀！你已经掌握了很多知识和技能，大脑发育得很好。你已经学会了如何运用自己的聪明才智来解决问题，接下来可以试着挑战更难的内容，你会发现自己比想象中更厉害。`;
  if (percent >= 60) return `${n}小朋友展现了很棒的基础能力！你现在正处于吸收知识的黄金时期，每一次练习都在为你搭建通往更高处的台阶。有些题目虽然有点难，但它们正是你成长的机会。`;
  if (percent >= 40) return `${n}小朋友正在积极成长中！大脑就像一棵小树苗，每次学习和练习都在长出新的枝叶。你答错的每一道题都不是失败，而是大脑正在悄悄变强的信号。最重要的是你敢于尝试——这份勇气比分数更珍贵。`;
  return `每个孩子都是独一无二的，发展节奏也各不相同。${n}小朋友今天敢于挑战自己，这本身就值得最热烈的掌声！保持好奇心和学习热情，这些品质比答对多少题更重要。`;
}

function genSuggestions() {
  const n = state.nickname, ag = state.ageGroup;
  let s = '';
  if (ag === '3-5') s = `🌱 ${n}小朋友，3-5岁是大脑飞速发展的时期。建议每天：①和爸爸妈妈一起读绘本15-20分钟；②玩积木和拼图游戏；③多去户外观察花草和小动物；④玩过家家等想象游戏。最重要的是——开开心心地玩，在玩中学习。`;
  else if (ag === '6-8') s = `🌿 ${n}小朋友，6-8岁是养成学习好习惯的时期。建议：①每天自己安静地读一会书；②玩数独、迷宫等趣味思维游戏；③做简单有趣的小实验（种豆子、观察蚂蚁）；④尝试写小日记记录每天有趣的事。保持好奇心最重要！`;
  else s = `🌳 ${n}小朋友，9-12岁是思维变得更缜密的时期。建议：①多读科普和历史类书籍，拓展知识面；②学习下棋或编程，训练系统性思考；③参加讨论或演讲活动，锻炼表达能力；④选一个喜欢的主题深入研究和动手实践。`;
  let strong = null, strongPct = 0, weak = null, weakPct = 100;
  Object.keys(state.domainScores).forEach(d => {
    const ds = state.domainScores[d], pct = ds.total > 0 ? Math.round((ds.correct/ds.total)*100) : 0;
    if (pct > strongPct) { strongPct = pct; strong = d; }
    if (pct < weakPct) { weakPct = pct; weak = d; }
  });
  const dn = { logic:'逻辑推理', memory:'记忆力', language:'语言表达', math:'数学思维', creativity:'创造力', observe:'观察力' };
  if (strong && dn[strong]) s += ` 💪 你最擅长的是【${dn[strong]}】，这是你的天赋领域，继续在这方面深入探索吧。`;
  if (weak && weak !== strong && dn[weak]) s += ` 📈 【${dn[weak]}】方面还有进步空间，不用着急，多玩相关的趣味游戏慢慢就会变强。`;
  s += ` 最棒的是你愿意接受挑战的勇气！这份勇气比任何分数都珍贵。`;
  return s;
}

function createSparkles() {
  const colors = ['#FFD93D','#FF6B9D','#42A5F5','#66BB6A','#AB47BC','#FF9800'];
  for (let i = 0; i < 10; i++) {
    const sp = document.createElement('span');
    sp.textContent = '✦';
    sp.style.cssText = `position:fixed;pointer-events:none;z-index:200;font-size:${16+Math.random()*20}px;color:${colors[Math.floor(Math.random()*colors.length)]};left:${30+Math.random()*40}%;top:${40+Math.random()*20}%;animation:sparkleBurst ${0.6+Math.random()*0.6}s ease-out forwards;`;
    document.body.appendChild(sp);
    setTimeout(() => sp.remove(), 1200);
  }
  if (!document.getElementById('sparkleStyle')) {
    const st = document.createElement('style');
    st.id = 'sparkleStyle';
    st.textContent = `@keyframes sparkleBurst{0%{opacity:1;transform:translate(0,0) scale(1);}100%{opacity:0;transform:translate(${Math.random()>0.5?'':'-'}${40+Math.random()*80}px,-${40+Math.random()*100}px) scale(0);}}`;
    document.head.appendChild(st);
  }
}

function createConfetti() {
  const colors = ['#FF6B9D','#FFD93D','#42A5F5','#66BB6A','#AB47BC','#FF9800','#26C6DA','#EC407A'];
  for (let i = 0; i < 60; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `left:${Math.random()*100}%;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*0.8}s;animation-duration:${1.5+Math.random()*2.5}s;width:${8+Math.random()*10}px;height:${8+Math.random()*10}px;`;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 3500);
  }
}

function restartGame() {
  state.questions = []; state.currentIndex = 0; state.score = 0; state.answered = false; state.correctCount = 0; state.domainScores = {};
  document.getElementById('questionPage').classList.add('hidden');
  document.getElementById('resultPage').classList.add('hidden');
  document.getElementById('landingPage').classList.remove('hidden');
}

function shakeElement(el) {
  el.style.animation = 'none'; el.offsetHeight; el.style.animation = 'shake 0.5s ease';
  setTimeout(() => el.style.animation = '', 500);
}
</script>
</body>
